<!doctype html>
<html lang="en">
<!-- ==========================
HEAD - Meta, Title, Styles
========================== -->
  <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orion AI Test</title>
  <link rel="stylesheet" href="styles.css?v=2">
  <style>
    .icon {
      width: 20px;
      height: 20px;
    }
    .hidden {
      display: none;
    }

    /* Ensure icons follow button color */
    #toggleThemeBtn {
      border: none;
      cursor: pointer;
    }

  </style>
</head>
<!-- ==========================
BODY - Main App Container
========================== -->
  <body>
  <div class="app-container">
   

  <!-- ==========================
       SIDEBAR
       - Sidebar header / logo
       - New chat button
       - Model selector (desktop dropdown)
       - Chat list (populated by JS)
       ========================== -->
    <div class="sidebar" role="navigation" aria-label="Chat history">
      <div class="sidebar-header">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 15 15">
          <path fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"
            d="M12.5 3h-10A1.5 1.5 0 0 0 1 4.5v5A1.5 1.5 0 0 0 2.5 11h5a.5.5 0 0 1 .354.146L10 13.294V11.5a.5.5 0 0 1 .5-.5h2A1.5 1.5 0 0 0 14 9.5v-5A1.5 1.5 0 0 0 12.5 3m-10-1h10A2.5 2.5 0 0 1 15 4.5v5a2.5 2.5 0 0 1-2.5 2.5H11v2.5a.5.5 0 0 1-.854.354L7.293 12H2.5A2.5 2.5 0 0 1 0 9.5v-5A2.5 2.5 0 0 1 2.5 2"/>
        </svg>
        <span>Chats</span>
      </div>

      <div class="new-chat-row">
        <button class="new-chat" id="newChatBtn">+ New Chat</button>

        <select id="modelSelector" class="model-selector" aria-label="Select model">
          <option disabled>── OpenAI ──</option>
          <option value="openai|gpt-5.5-2026-04-23">GPT 5.5</option>
          <option value="openai|gpt-5.4-2026-03-05">GPT 5.4</option>
          <option value="openai|gpt-5.3-codex">GPT 5.3 Codex</option>
          <option value="openai|gpt-5.4-mini-2026-03-17">GPT 5.4 Mini</option>
        
          <option disabled>── Anthropic ──</option>
          <option value="anthropic|claude-opus-4-8">Claude Opus 4.8</option>
          <option value="anthropic|claude-sonnet-4-6">Claude Sonnet 4.6</option>
          <option value="anthropic|claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
        
          <option disabled>── Gemini ──</option>
          <option value="gemini|gemini-3.5-flash">Gemini 3.5 Flash</option>
          <option value="gemini|gemini-2.5-flash">Gemini 2.5 Flash</option>
          <option value="gemini|gemini-3.1-flash-lite">Gemini Flash Lite 3.1</option>
        </select>
      </div>

      <div class="chat-list" id="chatList" aria-live="polite"></div>
    </div>

<!-- ==========================
MAIN CHAT WINDOW
========================== -->
<div class="main-content chat-window" role="main">

  <!-- ==========================
         CHAT HEADER
         - Chat title
         - Sidebar toggle button
         - Light/Dark mode toggle
         - Palette theme picker button
         ========================== -->
  <div class="chat-header" id="chatHeader">
  <span class="chat-title" id="chatTitle">Messages</span>

    
  <div class="header-controls">
     <!-- Sidebar Toggle -->
    <button id="toggleSidebarBtn" aria-label="Toggle Sidebar">
       <!-- Hamburger -->
      <svg class="icon hide-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
        <!-- Chevron left -->
      <svg class="icon show-icon hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
 <!-- Theme Toggle -->
    <button id="toggleThemeBtn" aria-label="Toggle Light/Dark Mode">
      <svg class="icon dark-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M21.46 16.54A10.51 10.51 0 1 1 12 1.49a10.34 10.34 0 0 1 2.8.38 8.12 8.12 0 0 0 2.45 15.86 8 8 0 0 0 4.21-1.19z"
          fill="none" stroke="currentColor" stroke-width="1.9"/>
      </svg>
      <svg class="icon light-icon hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340.127 340.127">
        <path d="M181.401 0h-22.675v56.688h22.675V0zm-139.611 282.306l16.031 16.031 40.09-40.09-16.031-16.031-40.09 40.09zm14.898-123.58H0v22.675h56.688v-22.675zm241.649-100.904L282.306 41.79l-40.09 40.09 16.031 16.031 40.09-40.09zM237.749 265.39l40.747 40.747 16.303-16.303-40.747-40.747-16.303 16.303zm45.69-106.664v22.675h56.688v-22.675H283.439zM170.064 79.363c-50.089 0-90.701 40.611-90.701 90.701s40.611 90.701 90.701 90.701 90.701-40.611 90.701-90.701-40.612-90.701-90.701-90.701zm0 158.726c-37.573 0-68.025-30.453-68.025-68.025s30.452-68.025 68.025-68.025 68.025 30.453 68.025 68.025-30.452 68.025-68.025 68.025zm-11.338 102.038h22.675v-56.688h-22.675v56.688zM91.041 86.098l-40.747-40.77L33.99 61.631l40.747 40.747 16.304-16.28z"
          fill="currentColor"/>
      </svg>
    </button>

<!-- ==========================
PALETTE / THEME PICKER BUTTON
(Opens the colour palette bottom sheet)
========================== -->
<div class="theme-dropdown">
  <button id="themeBtn" class="theme-btn" aria-label="Change Theme" aria-expanded="false" aria-controls="paletteSheet">
 <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
  <defs>
    <clipPath id="wheelClip">
      <circle cx="12" cy="12" r="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#wheelClip)">
    <path d="M12 12 L12 2 A10 10 0 0 1 21.51 9.06 Z" fill="#5e8c61"/>
    <path d="M12 12 L21.51 9.06 A10 10 0 0 1 17.88 20.09 Z" fill="#2c4f80"/>
    <path d="M12 12 L17.88 20.09 A10 10 0 0 1 6.12 20.09 Z" fill="#9467bd"/>
    <path d="M12 12 L6.12 20.09 A10 10 0 0 1 2.49 9.06 Z" fill="#8b0000"/>
    <path d="M12 12 L2.49 9.06 A10 10 0 0 1 12 2 Z" fill="#006d65"/>
  </g>

  <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.4"/>
  <circle cx="12" cy="12" r="2.2" fill="currentColor" opacity="0.14"/>
</svg>
  </button>
</div>

<!-- ==========================
PALETTE BOTTOM SHEET
(Colour theme picker, opened by the palette button above)
========================== -->
<div id="sheetBackdrop" class="sheet-backdrop hidden"></div>

<section id="paletteSheet" class="palette-sheet hidden" role="dialog" aria-modal="true" aria-labelledby="paletteTitle">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h3 id="paletteTitle">Choose theme</h3>
    <button id="closeSheetBtn" class="sheet-close" aria-label="Close theme picker">✕</button>
  </div>

  <div class="sheet-grid">
    <button class="sheet-option" data-theme="Green">
      <span class="swatch" style="--sw:#22c55e;"></span><span class="theme-label">Green</span>
    </button>
    <button class="sheet-option" data-theme="Blue">
      <span class="swatch" style="--sw:#3b82f6;"></span><span class="theme-label">Blue</span>
    </button>
    <button class="sheet-option" data-theme="Purple">
      <span class="swatch" style="--sw:#a855f7;"></span><span class="theme-label">Purple</span>
    </button>
    <button class="sheet-option" data-theme="Red">
      <span class="swatch" style="--sw:#ef4444;"></span><span class="theme-label">Red</span>
    </button>
    <button class="sheet-option" data-theme="Teal">
      <span class="swatch" style="--sw:#14b8a6;"></span><span class="theme-label">Teal</span>
    </button>
    <button class="sheet-option" data-theme="Orange">
      <span class="swatch" style="--sw:#F28C28;"></span><span class="theme-label">Orange</span>
    </button>
  </div>
</section>
  </div>
  </div>


<!-- ==========================
MESSAGES AREA
(Chat messages are injected here by JS)
========================== -->
  <div class="messages" id="messages" aria-live="polite"></div>

<!-- ==========================
SCROLL BUTTONS
- Scroll to top
- Scroll to bottom
========================== -->
<!-- Scroll-to-Top Button -->
<button id="scrollTopBtn" class="scroll-top-btn" title="Scroll to top">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
       fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round"
       width="20" height="20">
    <polyline points="18 15 12 9 6 15"/>
  </svg>
</button>

<!-- Scroll-to-Bottom Button -->
<button id="scrollBottomBtn" class="scroll-bottom-btn" title="Scroll to bottom">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
       fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round"
       width="20" height="20">
    <polyline points="6 9 12 15 18 9"/>
  </svg>
</button>

<!-- ==========================
MESSAGE INPUT AREA
- Text input field
- Send button
========================== -->
  <div class="input-area">
    <textarea id="input" placeholder="Type your message..."></textarea>
    <button class="send-btn" id="sendBtn" type="submit">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 12L4 4L6 12M20 12L4 20L6 12M20 12H6"/>
      </svg>
    </button>
  </div>
</div>
</div>
</div>
